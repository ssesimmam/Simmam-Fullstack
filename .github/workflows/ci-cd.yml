name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install root dependencies
        run: npm ci
      - name: Build API
        env:
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          cd api
          npm ci
          npm run build
      - name: Build Frontend
        env:
          VITE_SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npm ci
          npm run build
      - name: Upload frontend sourcemaps to Sentry
        if: github.ref == 'refs/heads/main' && secrets.SENTRY_AUTH_TOKEN != '' && secrets.SENTRY_ORG != '' && secrets.SENTRY_PROJECT_WEB != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_WEB }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npx @sentry/cli releases new "$SENTRY_RELEASE"
          npx @sentry/cli releases files "$SENTRY_RELEASE" upload-sourcemaps ./dist --rewrite --url-prefix "~/"
          npx @sentry/cli releases finalize "$SENTRY_RELEASE"
      - name: Upload API sourcemaps to Sentry
        if: github.ref == 'refs/heads/main' && secrets.SENTRY_AUTH_TOKEN != '' && secrets.SENTRY_ORG != '' && secrets.SENTRY_PROJECT_API != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_API }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          npx @sentry/cli releases files "$SENTRY_RELEASE" upload-sourcemaps ./api/dist --rewrite --url-prefix "app:///"
      - name: Run lint
        run: npm run lint || true

  staging-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Apply DB migrations to staging
        if: env.APPLY_MIGRATIONS == 'true'
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          echo "Applying migrations to staging"
          PGPASSWORD=$STAGING_DB_PASSWORD psql "$STAGING_DB_URL" -f supabase/migrations/20260521_safer_create_registration.sql

      - name: Run Postman smoke tests (Newman)
        if: env.RUN_SMOKE == 'true'
        env:
          BASE_URL: ${{ env.STAGING_URL }}
        run: |
          npm ci --prefix .
          npx newman run load-tests/postman_collection.json --env-var "baseUrl=${{ env.STAGING_URL }}" --bail

      - name: Run k6 load test (staging)
        if: env.RUN_LOAD == 'true'
        env:
          TARGET_URL: ${{ env.STAGING_URL }}
        run: |
          sudo apt-get update && sudo apt-get install -y gnupg2 ca-certificates
          wget -q -O - https://dl.k6.io/key.gpg | sudo apt-key add -
          echo 'deb https://dl.k6.io/deb stable main' | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
          k6 run -e TARGET_URL=${{ env.STAGING_URL }} load-tests/k6-load-test.js
      - name: Deploy API to staging (placeholder)
        run: echo "Deploy your API here (e.g., Railway, Fly, Cloud Run)"
      - name: Deploy Frontend to staging (placeholder)
        run: echo "Deploy your frontend here (e.g., Vercel)"
      - name: Deploy Frontend to Cloudflare Pages
        if: env.DEPLOY_CLOUDFLARE == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PROJECT_NAME }}
          directory: ./dist

  production-deploy:
    needs: staging-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Manual approval
        uses: peter-evans/wait-for-workflow@v1
      - name: Backup DB (production)
        run: |
          echo "Run DB backup step here using pg_dump and store artifact"
      - name: Apply production migrations
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
        run: |
          PGPASSWORD=$PROD_DB_PASSWORD psql "$PROD_DB_URL" -f supabase/migrations/20260521_safer_create_registration.sql
      - name: Deploy API to production (placeholder)
        run: echo "Deploy API to production"
      - name: Deploy Frontend to production (placeholder)
        run: echo "Deploy frontend to production"
